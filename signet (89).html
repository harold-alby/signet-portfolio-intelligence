const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #F2F3F7; color: #030D32; min-height: 100vh; }

.wrap { min-height: 100vh; background: #F2F3F7;
  background-image: radial-gradient(ellipse 70% 40% at 50% -5%, rgba(241,185,66,0.07) 0%, transparent 65%); }

/* Header */
.hdr { position: sticky; top: 0; z-index: 100; height: 76px; padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.97); backdrop-filter: blur(16px); box-shadow: 0 1px 0 #D0D5E2;
  border-bottom: none; }
.hdr img { height: 54px; width: auto; object-fit: contain; }
.hdr-pills { display: flex; gap: 10px; align-items: center; }
.pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px;
  text-transform: uppercase; padding: 4px 12px; border-radius: 20px; }
.pill-gold { color: #B88A14; border: 1px solid rgba(241,185,66,0.4); background: rgba(241,185,66,0.10); }
.pill-teal { color: #006E69; border: 1px solid rgba(0,136,130,0.35); background: rgba(0,136,130,0.08); }

/* Tabs */
.tabs { display: flex; padding: 0 40px; background: #FFFFFF;
  border-bottom: 1px solid #D0D5E2; overflow-x: auto; }
.tab { padding: 15px 20px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap;
  color: #909AB5; border-bottom: 2px solid transparent; transition: all 0.2s; }
.tab:hover { color: #030D32; }
.tab.on { color: #F1B942; border-bottom-color: #F1B942; }
.tab-n { font-family: 'JetBrains Mono', monospace; font-size: 9px; margin-left: 7px;
  background: rgba(241,185,66,0.12); color: #B88A14; padding: 2px 6px; border-radius: 8px; }

/* Main */
.main { max-width: 1160px; margin: 0 auto; padding: 44px 40px; }
.ptitle { font-size: 30px; font-weight: 800; color: #030D32; letter-spacing: -0.5px; margin-bottom: 8px; }
.psub { font-size: 13px; color: #626A88; line-height: 1.6; max-width: 520px; margin-bottom: 36px; }

/* Drop zone */
.drop { border: 1.5px dashed #C8CEDC; border-radius: 16px; padding: 56px 32px;
  text-align: center; cursor: pointer; transition: all 0.25s;
  background: #FAFBFD; margin-bottom: 24px; position: relative; overflow: hidden; }
.drop::before { content: ''; position: absolute; inset: 0; pointer-events: none;
  background: radial-gradient(ellipse 60% 50% at 50% -5%, rgba(241,185,66,0.07) 0%, transparent 70%); }
.drop:hover, .drop.over { border-color: #F1B942; background: rgba(241,185,66,0.04); }
.drop.over { border-style: solid; }
.drop-ico { width: 58px; height: 58px; margin: 0 auto 18px; border-radius: 14px; font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(241,185,66,0.09); border: 1px solid rgba(241,185,66,0.2); }
.drop h3 { font-size: 19px; font-weight: 800; color: #030D32; margin-bottom: 7px; }
.drop p { font-size: 13px; color: #626A88; }
.drop p span { color: #F1B942; text-decoration: underline; cursor: pointer; }
.drop-feats { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin-top: 18px; }
.drop-feats span { font-size: 11px; color: #909AB5; }
.drop-feats span::before { content: '\u2713 '; color: #008882; }

/* File rows */
.flist { display: flex; flex-direction: column; gap: 9px; margin-bottom: 22px; }
.frow { display: flex; align-items: center; gap: 13px; padding: 14px 18px;
  background: #FFFFFF; border: 1px solid #D0D5E2; border-radius: 11px; box-shadow: 0 1px 3px rgba(3,13,50,0.05); transition: border-color 0.2s; }
.frow:hover { border-color: #F1B942; }
.frow-ico { width: 38px; height: 38px; flex-shrink: 0; border-radius: 8px; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(242,63,44,0.08); border: 1px solid rgba(242,63,44,0.2); }
.frow-info { flex: 1; min-width: 0; }
.frow-name { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #030D32;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.frow-meta { font-size: 11px; color: #909AB5; margin-top: 2px; }
.frow-bar { height: 2px; margin-top: 7px; background: #E0E3EC; border-radius: 1px; overflow: hidden; }
.frow-bar-fill { height: 100%; background: #F1B942; border-radius: 1px;
  animation: prog 1.8s ease-in-out infinite; }
.frow-bar-fill.ai-fill { background: #008882; }
@keyframes prog { 0% { width: 5%; } 70% { width: 80%; } 100% { width: 98%; } }
.chip { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 3px 10px;
  border-radius: 12px; flex-shrink: 0; display: flex; align-items: center; gap: 5px; letter-spacing: 0.5px; }
.chip-ready { background: rgba(241,185,66,0.08); color: #F1B942; border: 1px solid rgba(241,185,66,0.22); }
.chip-run   { background: rgba(0,136,130,0.08);  color: #008882; border: 1px solid rgba(0,136,130,0.22); }
.chip-done  { background: rgba(138,201,172,0.1); color: #8AC9AC; border: 1px solid rgba(138,201,172,0.28); }
.chip-err   { background: rgba(242,63,44,0.08);  color: #F23F2C; border: 1px solid rgba(242,63,44,0.22); }
.spin { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid rgba(241,185,66,0.2); border-top-color: #F1B942;
  animation: spin 0.7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.xbtn { background: none; border: none; color: #909AB5; cursor: pointer; font-size: 16px;
  padding: 4px 6px; border-radius: 5px; flex-shrink: 0; transition: color 0.2s; }
.xbtn:hover { color: #F23F2C; }

/* Buttons */
.brow { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 44px; }
.btn-g { background: #F1B942; color: #030D32; border: none; padding: 12px 24px; border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
.btn-g:hover { background: #F7C85A; transform: translateY(-1px); box-shadow: 0 8px 28px rgba(241,185,66,0.25); }
.btn-g:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-o { background: transparent; color: #030D32; border: 1px solid #C8CEDC; padding: 12px 20px;
  border-radius: 10px; font-family: 'Nunito', sans-serif; font-weight: 600; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s; }
.btn-o:hover { border-color: #F1B942; color: #B88A14; }
.btn-o:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-sm { padding: 7px 13px !important; font-size: 11px !important; border-radius: 8px !important; }

/* Section label */
.slbl { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #008882;
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 18px;
  display: flex; align-items: center; gap: 12px; }
.slbl::after { content: ''; flex: 1; height: 1px; background: #D0D5E2; }

/* Result card */
.rc { background: #FFFFFF; border: 1px solid #D0D5E2; border-radius: 16px;
  margin-bottom: 22px; overflow: hidden; transition: border-color 0.2s; }
.rc:hover { border-color: #F1B942; box-shadow: 0 4px 20px rgba(3,13,50,0.08); }
.rc-hdr { padding: 18px 24px; border-bottom: 1px solid #EEF0F6; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
.rc-title { font-size: 17px; font-weight: 800; color: #030D32;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.rc-body { padding: 24px; background: #FAFBFD; }

/* Metric tiles */
.mgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 11px; margin-bottom: 22px; }
.mtile { background: #FFFFFF; border: 1px solid #D0D5E2; border-radius: 10px; padding: 13px 15px; }
.mtile-l { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #909AB5;
  text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
.mtile-v { font-size: 17px; font-weight: 700; color: #030D32; }
.c-gold { color: #F1B942 !important; }
.c-teal { color: #008882 !important; }
.c-grn  { color: #8AC9AC !important; }
.c-red  { color: #F23F2C !important; }
.c-sl   { color: #626A88 !important; }

/* Reconciliation block */
.recon { border-radius: 13px; padding: 18px 20px; margin-bottom: 20px; }
.recon-p { background: rgba(138,201,172,0.07); border: 1px solid rgba(138,201,172,0.38); }
.recon-w { background: rgba(241,185,66,0.07);  border: 1px solid rgba(241,185,66,0.38); }
.recon-f { background: rgba(242,63,44,0.06);   border: 1px solid rgba(242,63,44,0.38); }
.recon-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.recon-top h4 { font-size: 13px; font-weight: 700; }
.recon-p .recon-top h4 { color: #8AC9AC; }
.recon-w .recon-top h4 { color: #F1B942; }
.recon-f .recon-top h4 { color: #F23F2C; }
.recon-badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 1px;
  padding: 3px 9px; border-radius: 9px; margin-left: auto; }
.recon-p .recon-badge { background: rgba(138,201,172,0.15); color: #8AC9AC; border: 1px solid rgba(138,201,172,0.3); }
.recon-w .recon-badge { background: rgba(241,185,66,0.12);  color: #F1B942; border: 1px solid rgba(241,185,66,0.3); }
.recon-f .recon-badge { background: rgba(242,63,44,0.1);    color: #F23F2C; border: 1px solid rgba(242,63,44,0.3); }
.recon-rows { display: flex; flex-direction: column; gap: 6px; }
.recon-row { display: flex; align-items: flex-start; gap: 9px; font-size: 12px; color: #4A5470; line-height: 1.55; }
.ring { width: 50px; height: 50px; flex-shrink: 0; }

/* Alloc bars */
.abar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.abar-l { font-size: 12px; color: #626A88; font-weight: 500; width: 116px; flex-shrink: 0; }
.abar-bg { flex: 1; height: 5px; background: #E0E3EC; border-radius: 3px; overflow: hidden; }
.abar-fill { height: 100%; border-radius: 3px; transition: width 0.9s ease; }
.abar-pct { font-family: 'JetBrains Mono', monospace; font-size: 10px; width: 40px; text-align: right; flex-shrink: 0; color: #F1B942; }

/* Holdings table */
.twrap { overflow-x: auto; border-radius: 10px; border: 1px solid #D0D5E2; margin-bottom: 20px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
.tbl th { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #909AB5;
  text-transform: uppercase; letter-spacing: 2px; text-align: left; padding: 10px 13px;
  border-bottom: 1px solid #D0D5E2; font-weight: 500; background: #F5F6FA; }
.tbl td { padding: 10px 13px; color: #030D32; border-bottom: 1px solid #EEF0F6; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr:hover td { background: #F5F7FC; }
.tbl-flag td { background: rgba(242,63,44,0.04) !important; }

/* Tags */
.tag { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 9px;
  padding: 2px 7px; border-radius: 4px; letter-spacing: 0.5px; }
.tag-tl { background: rgba(0,136,130,0.08); color: #006E69; border: 1px solid rgba(0,136,130,0.2); }
.tag-gd { background: rgba(241,185,66,0.10); color: #B88A14; border: 1px solid rgba(241,185,66,0.2); }
.tag-rp { display: inline-flex; align-items: center; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; padding: 3px 10px; border-radius: 11px; font-weight: 600; letter-spacing: 0.5px; }
.rp-c { background: rgba(138,201,172,0.1); color: #8AC9AC; border: 1px solid rgba(138,201,172,0.25); }
.rp-b { background: rgba(241,185,66,0.1);  color: #F1B942; border: 1px solid rgba(241,185,66,0.25); }
.rp-a { background: rgba(242,63,44,0.1);   color: #F23F2C; border: 1px solid rgba(242,63,44,0.25); }

/* Insight boxes */
.ibox { border-radius: 11px; padding: 15px 18px; margin-bottom: 13px; }
.ib-b { background: rgba(0,136,130,0.04); border: 1px solid rgba(0,136,130,0.15); }
.ib-r { background: rgba(242,63,44,0.04); border: 1px solid rgba(242,63,44,0.15); }
.ib-y { background: rgba(241,185,66,0.04); border: 1px solid rgba(241,185,66,0.15); }
.ibox h4 { font-size: 12px; font-weight: 700; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
.ib-b h4 { color: #008882; } .ib-r h4 { color: #F23F2C; } .ib-y h4 { color: #F1B942; }
.ibox ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.ibox li { font-size: 12px; color: #4A5470; display: flex; gap: 8px; line-height: 1.55; }
.ib-b li::before { content: '\u2192'; color: #008882; flex-shrink: 0; font-weight: 700; }
.ib-r li::before { content: '\u26A0'; color: #F23F2C; flex-shrink: 0; }
.ib-y li::before { content: '+'; color: #F1B942; flex-shrink: 0; font-weight: 700; }

/* Export row */
.exprow { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 16px; margin-top: 16px; border-top: 1px solid #EEF0F6; }

/* -- Review/Correction Modal -- */
.modal-overlay { position: fixed; inset: 0; background: rgba(3,13,50,0.55); backdrop-filter: blur(4px);
  z-index: 1000; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px; overflow-y: auto; }
.modal { background: #FFFFFF; border-radius: 18px; width: 100%; max-width: 780px;
  box-shadow: 0 24px 64px rgba(3,13,50,0.22); overflow: hidden; }
.modal-hdr { padding: 22px 28px 20px; border-bottom: 1px solid #EEF0F6;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.modal-hdr h2 { font-size: 19px; font-weight: 800; color: #030D32; }
.modal-hdr p  { font-size: 12px; color: #626A88; margin-top: 4px; max-width: 480px; line-height: 1.5; }
.modal-close { background: none; border: none; font-size: 22px; color: #909AB5; cursor: pointer;
  padding: 2px 6px; border-radius: 6px; flex-shrink: 0; transition: color 0.15s; }
.modal-close:hover { color: #F23F2C; }
.modal-body { padding: 24px 28px; max-height: 68vh; overflow-y: auto; }
.modal-footer { padding: 16px 28px; border-top: 1px solid #EEF0F6; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.modal-quality { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 10px;
  border-radius: 8px; letter-spacing: 0.5px; }
.mq-good { background: rgba(138,201,172,0.12); color: #8AC9AC; border: 1px solid rgba(138,201,172,0.3); }
.mq-fair { background: rgba(241,185,66,0.12); color: #B88A14; border: 1px solid rgba(241,185,66,0.3); }
.mq-poor { background: rgba(242,63,44,0.1); color: #F23F2C; border: 1px solid rgba(242,63,44,0.3); }
.mq-unknown { background: rgba(113,120,157,0.1); color: #71789D; border: 1px solid rgba(113,120,157,0.25); }
/* Correction rows */
.corr-section { margin-bottom: 22px; }
.corr-section-title { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #008882;
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px; }
.corr-section-title::after { content: ''; flex: 1; height: 1px; background: #EEF0F6; }
.corr-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px;
  border: 1px solid #EEF0F6; border-radius: 10px; margin-bottom: 8px; background: #FAFBFD;
  transition: border-color 0.15s, background 0.15s; }
.corr-row.accepted { border-color: rgba(138,201,172,0.35); background: rgba(138,201,172,0.04); }
.corr-row.rejected { opacity: 0.55; background: #F5F6FA; }
.corr-toggle { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; accent-color: #008882; cursor: pointer; }
.corr-info { flex: 1; min-width: 0; }
.corr-field { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #008882;
  margin-bottom: 4px; font-weight: 600; }
.corr-reason { font-size: 12px; color: #4A5470; line-height: 1.5; margin-bottom: 6px; }
.corr-vals { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.corr-orig { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #909AB5;
  background: #F0F1F6; padding: 2px 7px; border-radius: 5px; text-decoration: line-through; }
.corr-arrow { color: #D0D5E2; font-size: 12px; }
.corr-new { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #030D32;
  background: rgba(138,201,172,0.12); padding: 2px 7px; border-radius: 5px; font-weight: 600; }
.corr-src { font-size: 9px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; margin-top: 2px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
.src-auto { background: rgba(241,185,66,0.1); color: #B88A14; border: 1px solid rgba(241,185,66,0.25); }
.src-ai   { background: rgba(0,136,130,0.1); color: #006E69; border: 1px solid rgba(0,136,130,0.25); }
/* Manual edit section */
.edit-section { margin-top: 22px; }
.edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.edit-field { display: flex; flex-direction: column; gap: 4px; }
.edit-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #909AB5;
  text-transform: uppercase; letter-spacing: 1.5px; }
.edit-input { border: 1px solid #D0D5E2; border-radius: 7px; padding: 8px 10px;
  font-size: 12px; font-family: 'Nunito', sans-serif; color: #030D32; background: #FFFFFF;
  transition: border-color 0.15s; outline: none; }
.edit-input:focus { border-color: #F1B942; }
.no-corr { font-size: 13px; color: #8AC9AC; padding: 20px; text-align: center;
  background: rgba(138,201,172,0.05); border: 1px dashed rgba(138,201,172,0.3); border-radius: 10px; }

/* -- Enfusion Side-by-Side Picker -- */
.enf-modal { max-width: 960px !important; }
.enf-section { margin-bottom: 28px; }
.enf-section-title { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #008882;
  letter-spacing: 3px; text-transform: uppercase; margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px; }
.enf-section-title::after { content: ''; flex: 1; height: 1px; background: #EEF0F6; }
.enf-header-grid { display: grid; grid-template-columns: 160px 1fr 1fr 90px; gap: 1px;
  background: #D0D5E2; border-radius: 8px 8px 0 0; overflow: hidden; font-size: 10px;
  font-family: 'JetBrains Mono', monospace; }
.enf-header-grid > div { padding: 8px 12px; background: #F5F6FA; color: #909AB5;
  text-transform: uppercase; letter-spacing: 1.5px; }
.enf-field-row { display: grid; grid-template-columns: 160px 1fr 1fr 90px; gap: 1px;
  background: #D0D5E2; }
.enf-field-row:last-child { border-radius: 0 0 8px 8px; overflow: hidden; }
.enf-field-row > div { background: #FFFFFF; padding: 9px 12px; font-size: 12px;
  display: flex; align-items: center; }
.enf-field-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #626A88;
  font-weight: 600; }
.enf-val { cursor: pointer; border-radius: 6px; padding: 3px 7px; transition: all 0.15s;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; width: 100%;
  border: 1px solid transparent; word-break: break-all; }
.enf-val.raw { color: #909AB5; }
.enf-val.corrected { color: #030D32; }
.enf-val.selected { border-color: #F1B942 !important; background: rgba(241,185,66,0.09) !important;
  color: #B88A14 !important; font-weight: 600; }
.enf-val.same { color: #C8CEDC; cursor: default; font-style: italic; font-size: 10px; }
.enf-pick { display: flex; gap: 5px; align-items: center; justify-content: center; }
.enf-pick label { display: flex; align-items: center; gap: 4px; font-size: 10px;
  font-family: 'JetBrains Mono', monospace; color: #626A88; cursor: pointer; }
.enf-pick input[type=radio] { accent-color: #F1B942; }
/* Holdings picker table */
.enf-holdings-wrap { overflow-x: auto; border: 1px solid #D0D5E2; border-radius: 10px; }
.enf-htbl { width: 100%; border-collapse: collapse; font-size: 11px; }
.enf-htbl th { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #909AB5;
  text-transform: uppercase; letter-spacing: 1.5px; padding: 9px 10px;
  border-bottom: 1px solid #D0D5E2; background: #F5F6FA; white-space: nowrap; }
.enf-htbl td { padding: 8px 10px; border-bottom: 1px solid #EEF0F6; vertical-align: top; }
.enf-htbl tr:last-child td { border-bottom: none; }
.enf-htbl tr:hover td { background: #FAFBFD; }
.enf-cell-pair { display: flex; flex-direction: column; gap: 3px; }
.enf-raw-v { font-size: 10px; color: #C8CEDC; text-decoration: line-through; }
.enf-fix-v { font-size: 11px; color: #030D32; font-weight: 600; }
.enf-same-v { font-size: 11px; color: #626A88; }
.enf-col-toggle { display: flex; flex-direction: column; align-items: center; gap: 3px; }
.enf-col-badge { font-size: 8px; font-family: 'JetBrains Mono', monospace; padding: 1px 5px;
  border-radius: 3px; cursor: pointer; border: 1px solid transparent; }
.enf-col-badge.raw-b { background: #F0F1F6; color: #909AB5; border-color: #D0D5E2; }
.enf-col-badge.fix-b { background: rgba(241,185,66,0.1); color: #B88A14; border-color: rgba(241,185,66,0.3); }
.enf-col-badge.active { font-weight: 700; }

/* Compare cards */
.cgrid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); margin-bottom: 32px; }
.cc { background: #FFFFFF; border: 1px solid #D0D5E2; border-radius: 14px; padding: 20px;
  transition: all 0.25s; }
.cc:hover { border-color: #F1B942; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(3,13,50,0.10); }
.cc-name { font-size: 16px; font-weight: 800; color: #030D32; margin-bottom: 3px; }
.cc-sub  { font-size: 10px; color: #909AB5; font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; }
.cc-val  { font-size: 24px; font-weight: 800; color: #F1B942; margin-bottom: 2px; }
.cc-vl   { font-size: 9px; color: #909AB5; text-transform: uppercase; letter-spacing: 2px;
  font-family: 'JetBrains Mono', monospace; margin-bottom: 14px; }
.cc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 12px; }
.cc-m { background: #F5F6FA; border: 1px solid #D0D5E2; border-radius: 7px; padding: 8px 10px; }
.cc-ml { font-size: 9px; color: #909AB5; text-transform: uppercase; letter-spacing: 1.5px;
  font-family: 'JetBrains Mono', monospace; margin-bottom: 3px; }

// Additional doc-type signals that override or refine custodian-based routing
function detectDocType(allText, filename) {
  const t = (allText || "").toLowerCase();
  const f = (filename || "").toLowerCase();
  // Strong trade-confirmation signals
  if (/contract note|your purchase|your sale|we are pleased to confirm|trade confirm|execution confirm/i.test(allText)) return "trade_confirmation";
  if (/we have purchased on your behalf|we have sold on your behalf/i.test(allText)) return "trade_confirmation";
  if (/bought\s+\|\s+sold|bought\/sold/i.test(allText)) return "trade_confirmation";
  if (/redemption.*isin|coupons.*isin|debit advice|credit advice/i.test(allText)) return "trade_confirmation";
  if (/foreign exchange contract note|fx trade/i.test(allText)) return "trade_confirmation";
  if (/Fx\s+Confirmation[s]?/i.test(allText)) return "trade_confirmation";
  if (/Account\s+Debited[:\s]/i.test(allText)) return "trade_confirmation";
  if (/EXECUTE\s+-\s+Self-Directed\s+Account/i.test(allText)) return "trade_confirmation";
  if (/SPOT\s+PURCHASE|SPOT\s+SALE/i.test(allText) && /SECURITY\s+NUMBER/i.test(allText)) return "trade_confirmation";
  if (/^COUPONS\s*$/im.test(allText) && /SECURITY\s+NUMBER/i.test(allText)) return "trade_confirmation";
  if (/^REDEMPTION\s*$/im.test(allText) && /SECURITY\s+NUMBER/i.test(allText)) return "trade_confirmation";
  // Transaction list / booking list signals
  if (/booking.list|order\s+date.*order\s+type.*debit\s+amount/i.test(allText)) return "transaction_list";
  if (/account\s+statement.*from.*to|opening\s+balance.*closing\s+balance/i.test(allText)) return "account_statement";
  if (/kontobewegungen|accounting\s+movements/i.test(allText)) return "transaction_list";
  if (/Booking\s+Date[\s\S]{0,60}Trade\s+Date[\s\S]{0,60}Settlement\s+Date/i.test(allText)) return "transaction_list";
  // Portfolio statement signals
  if (/portfolio\s+statement|portfolio\s+value|total\s+assets|holdings\s+summary|asset\s+allocation/i.test(allText)) return "portfolio_statement";
  if (/market\s+value.*isin|isin.*market\s+value/i.test(allText)) return "portfolio_statement";
  if (/position\s+details|list\s+of\s+positions|portfolio\s+details/i.test(allText)) return "portfolio_statement";
  return null; // no strong signal
}

async function classifyFile(file) {
  try {
    await loadPDFJS();
    const arrayBuf = await file.arrayBuffer();
    const pdf = await window.pdfjsLib.getDocument({ data: arrayBuf }).promise;
    const pagesToRead = Math.min(pdf.numPages, 3);
    let allText = "";
    for (let i = 1; i <= pagesToRead; i++) {
      try {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        allText += tc.items.map(it => it.str).join(" ") + "\n";
      } catch (_) {}
    }
    const custodian = detectCustodianFormat(allText, file.name);
    const meta = FILE_TYPE_META[custodian] || FILE_TYPE_META.generic;
    const docTypeOverride = detectDocType(allText, file.name);
    const docType = docTypeOverride || meta.docType;
    // Determine suggested tab based on final docType
    let suggestedTab = meta.tab;
    if (docType === "trade_confirmation" || docType === "transaction_list" || docType === "account_statement") {
      suggestedTab = "tradeconfirm";
    } else if (docType === "portfolio_statement") {
      suggestedTab = "upload";
    }
    return { custodian, custodianLabel: meta.label, docType, suggestedTab, pageCount: pdf.numPages };
  } catch (e) {
    return { custodian: "generic", custodianLabel: "Unknown", docType: "unknown", suggestedTab: "upload", pageCount: 0 };
  }
}

async function extractPDFPagesSplit(file, maxImagePagesPerChunk = 20) {

        parts.push(item.str);
        lastY = item.transform[5];

    const allText = textPages.map((p) => `--- PAGE ${p.pageNum} ---
${p.text}

    // Check the INNER pages (25%-75% of doc) specifically — these are the data pages.
    // For some PDFs (e.g. Barclays Monaco), cover/notes pages are readable but
    // data pages use unmapped CID fonts that produce garbled text.
    const q1 = Math.floor(allText.length * 0.25);
    const q3 = Math.floor(allText.length * 0.75);
    const innerSample = allText.slice(q1, q1 + 2e3);  // inner quarter sample
    const innerWordLike = (innerSample.match(/[a-zA-Z]{2,}/g) || []).length;
    const innerTok = (innerSample.match(/\S+/g) || []).length;
    // Full doc sample for overall check
    const fullSample = allText.slice(0, 800) + allText.slice(q1, q1 + 800) + allText.slice(-800);
    const wordLike = (fullSample.match(/[a-zA-Z]{2,}/g) || []).length;
    const totalTok = (fullSample.match(/\S+/g) || []).length;
    // Garbled if inner pages have low word ratio AND show CID-encoding artefacts

    // This is specific enough not to trigger on numeric-heavy but legitimate text PDFs
    const CID_PATTERN = /^(\[\d{3,6}\]\s*){3,}/m;
    const innerHasCIDPattern = CID_PATTERN.test(innerSample);
    const innerGarbled = innerTok > 50 && innerWordLike / innerTok < 0.15 && innerHasCIDPattern;
    const isGarbled = (totalTok > 0 && wordLike / totalTok < 0.3 && textPages.length > 5) || innerGarbled;

    const isSparsePDF = medianPageLen < 300 && textPages.length > 5;
    if (!isGarbled && !isSparsePDF) {
      const dataPages = pageTexts.filter((p) => p.hasData).map((p) => p.pageNum);
      const numChunks = Math.max(3, Math.ceil(textPages.length / 8)); // ~8 pages per chunk, min 3 chunks
      const pagesPerChunk = Math.ceil(textPages.length / numChunks);
      const finalChunks = [];
      for (let qi = 0; qi < numChunks; qi++) {
        const pageSlice = textPages.slice(qi * pagesPerChunk, (qi + 1) * pagesPerChunk);
        if (!pageSlice.length) continue;
        const chunkText = pageSlice.map((p) => `--- PAGE ${p.pageNum} ---
${p.text}

`).join("");
        if (chunkText.trim().length < 10) continue;
        // Detect if this chunk is PREDOMINANTLY a transaction/activity section.
        // Only block if: (a) a transaction header appears AND (b) no bond/equity ISINs follow it.
        // This prevents blocking chunks that contain both holdings (pages 13-15) AND
        // a transaction section later in the same chunk (e.g. page 17).

        const ISIN_PATTERN = /\b[A-Z]{2}[A-Z0-9]{9}[0-9]\b/;
        const txnHeaderMatch = TXN_PAGE_SIGNALS.exec(chunkText);
        // Only block a chunk if it has a transaction header AND contains NO ISINs at all.
        // A chunk that has holdings (ISINs) before a transaction section (e.g. pages 13-15
        // followed by page 17 "Investment Activity") must NOT be blocked — the holdings
        // pages are the majority of the chunk and must be processed.
        const chunkISINs = (chunkText.match(ISIN_PATTERN) || []).length;
        const isTxnChunk = txnHeaderMatch !== null && chunkISINs === 0;

          pages: [],

          selectedPages: dataPages,
          textMode: true,
          fullText: chunkText.slice(0, 65e3),
          chunkLabel: ` (pages ${pageSlice[0].pageNum}\u2013${pageSlice[pageSlice.length - 1].pageNum})`,
          isTransactionSection: isTxnChunk,

      const page = await pdf.getPage(i);
      const b64 = await renderPageToBase64(page, 2);
      pages.push({ pageNum: i, b64, nativeText: pageTexts[i - 1]?.text || "" });

      pages,
      totalPages: total,
      selectedPages: selArr,
      textMode: false,
      fullText: "",
      chunkLabel: ` (pages ${start}\u2013${end})`,
      custodianFormat: _imgFmt

async function fetchWithRetry(url, options, maxRetries = 5) {
  let delay = 4e3;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    const res = await fetch(url, options);
    if (res.status === 429 || res.status === 529 || res.status === 503) {
      if (attempt === maxRetries) {
        const body = await res.text().catch(() => "");
        throw new Error(`API ${res.status} after ${maxRetries} retries: ${body.slice(0, 200)}`);
      }
      const retryAfter = res.headers.get("retry-after");
      const wait = retryAfter ? parseInt(retryAfter) * 1e3 : delay;
      await new Promise((r) => setTimeout(r, wait));
      delay = Math.min(delay * 2, 3e4);
      continue;
    }
    return res;
  }
}

    const code = text.charCodeAt(i);
    if (code === 0) continue;
    if (code < 9) continue;
    if (code === 11 || code === 12) continue;
    if (code > 13 && code < 32) continue;
    if (code === 127) continue;
    if (code >= 55296 && code <= 57343) continue;
    out += text[i];
  }
  return out;
}

      if (val > cashSeen[ccyKey].val) {
        cashSeen[ccyKey].idx._dupCash = true;
        cashSeen[ccyKey] = { val, idx: h };
        return h;
      }
      return { ...h, _dupCash: true };
    });
    d.holdings = d.holdings.filter(h => !h._dupCash);
  }

  // IBKR: deterministic filtering — remove everything except genuine Open Positions
  if (fmt === "ibkr") {
    // Step 1: Name-based filter — IBKR section labels, Cash Report rows, NAV rows
    const IBKR_SKIP_NAME = /^(interest accruals?|bond interest accruals?|dividend accruals?|total forex|^forex$|mark.to.market|net asset value|withholding tax|transaction fees?|cash report|accrued interest|accrued dividends?|total accrued|subtotal|grand total|commissions?|withdrawals?|bond interest paid|trades? \(purchases?\)|trades? \(sales?\)|cash fx|cash fx translation|ending stated cash|net cash balance|starting cash|collateral value|ending collateral|starting collateral|net securities|net settled|broker interest|securities lent|stock yield enhancement|syep|activity|starting value|ending value|change in|total in usd|total in gbp|total \(all|futures|advisor client|investment advisor|account type|base currency|signet capital|^(usd|gbp|eur|aed|chf|jpy|aud|hkd|cad|nok|sek|dkk|pln)$|^stocks$|^bonds$|^equities$|^total\s+|gbp\s+iusd|usd\s+bacn|gbp\s+[0-9])/i;
    
    // Step 2: Value-based filter
    // Valid Open Positions values: individual positions between ~$100 and ~$2,500,000
    // Cash is the one exception (can be large), but cash always has isin="-" and type=cash
    const isValueImplausible = (h) => {
      const v = h.valueNumeric;
      if (v === null || v === undefined || v === 0) return false;
      const absV = Math.abs(v);
      const isCash = /^cash/i.test(h.type || "") || /portfolio cash/i.test(h.name || "");
      // Negative values other than cash overdrafts are almost certainly Cash Report rows
      if (v < -10000 && !isCash) return true;
      // Values > 2M that aren't the main cash balance are almost certainly subtotals
      if (absV > 2000000 && !isCash) return true;
      // Values > 700K with no ISIN and not cash = almost certainly a section subtotal
      // (individual positions in a typical IBKR portfolio are rarely > 700K unless it's cash)
      const noIsin = !h.isin || h.isin === "-" || h.isin === "";
      if (noIsin && absV > 700000 && !isCash) return true;
      // Exact round thousands (no cents) >= 50,000 with no ISIN = face value from wrong section
      if (noIsin && absV >= 50000 && absV % 1000 === 0 && !isCash) return true;
      // Values < 20,000 with no ISIN are almost certainly MTM P&L or quantity figures
      // Smallest real Open Positions holding in this portfolio is COPX ~$19,082
      // Values < 15,000 with no ISIN: MTM P&L or quantity (smallest real position is COPX ~19K)
      if (noIsin && absV > 0 && absV < 15000 && !isCash) return true;
      // Any NEGATIVE value for a non-cash holding is a P&L figure, not a market value
      if (v < 0 && !isCash) return true;
      return false;
    };
    
    d.holdings = (d.holdings || []).map((h) => {
      const name = (h.name || "").trim();
      if (IBKR_SKIP_NAME.test(name)) return { ...h, _ibkrSkip: true };
      if (isValueImplausible(h)) return { ...h, _ibkrSkip: true };
      return h;
    });
    const skipped = d.holdings.filter(h => h._ibkrSkip).length;
    d.holdings = d.holdings.filter(h => !h._ibkrSkip);
    if (skipped > 0) fixes.push({ field: "holdings", reason: `IBKR: removed ${skipped} non-position rows`, original: skipped, corrected: 0 });
    
    // Step 3: ISIN dedup — keep the version with higher (non-zero) market value

      const prev = isinSeen[h.isin];
      const prevVal = Math.abs(prev.valueNumeric || 0);
      const thisVal = Math.abs(h.valueNumeric || 0);
      if (thisVal > prevVal) { prev._ibkrDup = true; isinSeen[h.isin] = h; return h; }
      return { ...h, _ibkrDup: true };
    });
    d.holdings = d.holdings.filter(h => !h._ibkrDup);
    
    // Step 4: Name-based merge — combine value from one chunk with ISIN from another
    // IBKR splits holdings across sections: Open Positions has values, Financial Instrument
    // Info has ISINs. Merge by normalized name, taking best of each field.
    const nameSeen = {};
    d.holdings = d.holdings.map((h) => {

      const key = (h.ticker && h.ticker.trim() && h.ticker !== "-")
        ? ("t:" + h.ticker.toLowerCase().trim())
        : (h.name || "").toLowerCase().replace(/[^a-z0-9]/g, "").slice(0, 20);
      if (!key || key.length < 4) return h;
      if (!nameSeen[key]) { nameSeen[key] = h; return h; }
      const prev = nameSeen[key];
      const thisVal = Math.abs(h.valueNumeric || 0);
      const prevVal = Math.abs(prev.valueNumeric || 0);
      const thisHasIsin = h.isin && h.isin !== "-" && h.isin !== "";
      const prevHasIsin = prev.isin && prev.isin !== "-" && prev.isin !== "";
      // Merge: keep the entry with value, enriched with ISIN from the other
      if (thisVal > 0 && prevVal === 0 && thisHasIsin === false && prevHasIsin) {
        // this has value, prev has ISIN — merge ISIN onto this
        nameSeen[key] = { ...h, isin: prev.isin, ticker: prev.ticker || h.ticker };
        prev._ibkrDup2 = true;
        return nameSeen[key];
      }
      if (prevVal > 0 && thisVal === 0 && prevHasIsin === false && thisHasIsin) {
        // prev has value, this has ISIN — merge ISIN onto prev
        nameSeen[key] = { ...prev, isin: h.isin, ticker: h.ticker || prev.ticker };
        return { ...h, _ibkrDup2: true };
      }
      // Standard dedup: keep the one with higher value
      if (thisVal > prevVal) { prev._ibkrDup2 = true; nameSeen[key] = h; return h; }
      return { ...h, _ibkrDup2: true };
    });
    d.holdings = d.holdings.filter(h => !h._ibkrDup2);
  }

    // Santander International ISIN-to-correct-name lookup
  // Applied when model substitutes a wrong issuer name for a correct ISIN
  if (fmt === "santander_intl") {
    const SANTANDER_ISIN_NAME_FIXES = {
      "US09261HBX44": "BLACKSTONE PRIVATE CREDIT FUND 6.000% 29-JAN-32",
      "XS3199501258": "BNP PARIBAS SA NC1 CMT10Y 7.03 05-DEC-35",
      "XS3109834112": "SOFTBANK GROUP CORP 6.875% 10-JAN-31",
      "US281020BB24": "EDISON INTERNATIONAL 5.250% 15-MAR-32",
      "USP3143NAY06": "CODELCO (CORP NACIONAL COBRE CHILE) 3.625% 01-AUG-27",
      "USV3856JAB99": "GREENKO WIND PROJECTS 7.250% 27-SEP-28",
      "US80386WAB19": "SASOL FINANCING USA LLC 6.500% 27-SEP-28",
      "US71568QAJ67": "PERUSAHAAN LISTRIK NEGARA (PLN) 3.875% 17-JUL-29",
      "USP9401CAA01": "TRUST FIBRAUNO 4.869% 15-JAN-30",
      "USP7S81YBJ38": "ORBIA ADVANCE CORPORATION 6.800% 13-MAY-30",
      "USL7909CAC12": "RAIZEN FUELS FINANCE 6.450% 05-MAR-34",
      "US5128073062": "LAM RESEARCH CORP",
      "US8522341036": "BLOCK INC-CLASS A",
      "US2043191079": "CIE FINANCIERE RICHEMONT-UNSP ADR",
      "US46438F1012": "iShares Bitcoin Trust ETF",
    };
    const KNOWN_WRONG = [
      /^blackrock/i, /^bank.{0,5}of.{0,5}america/i, /^teva/i, /^emirates.{0,5}telecom/i,
      /^fibra.{0,5}uno/i, /^gerdau/i, /^saudi.{0,5}arabian.{0,5}oil/i,
      /^petroleos.*3\.875/i, /^turkiye/i, /^lennar/i, /^starbucks/i,
      /^compagnie.{0,10}michelin/i, /^alternative fund$/i
    ];
    d.holdings = (d.holdings || []).map((h) => {
      const isinFix = h.isin && SANTANDER_ISIN_NAME_FIXES[h.isin];
      if (!isinFix) return h;
      const nameIsWrong = !h.name || h.name === h.isin || KNOWN_WRONG.some(re => re.test(h.name));
      if (nameIsWrong) {
        fixes.push({ field: `holdings[${h.name}].name`, reason: "Santander ISIN-name correction applied", original: h.name, corrected: isinFix });
        return { ...h, name: isinFix, _nameFixed: true };
      }
      return h;
    });
  }
  d._autoFixes = fixes;
  return d;
}

async function enrichISINs(data, apiKey) {
  const SKIP_TYPES = /^(cash|term deposit|deposit|money market|accrual|dividend accrual|custfee|fee accrual)$/i;
  const SKIP_NAMES = /^(cash\s*(account|usd|eur|gbp|aed|chf|hkd|jpy|sgd|aud|cad)?|portfolio cash|current account|savings account|term deposit|dividend accrual|custfeeaccr|fee accrual|pb call account|savings account|call account|accrued interest)/i;
  // Include holdings with either a numeric value OR a stated allocation — bonds sometimes
  // have allocationNumeric but valueNumeric filled via back-calculation
  const needsISIN = (data.holdings || []).filter(h =>
    (!h.isin || h.isin === "-" || h.isin === "N/A") &&
    !SKIP_TYPES.test(h.type || "") &&
    !SKIP_NAMES.test(h.name || "") &&
    h.name && h.name !== "N/A" && h.name !== "-" &&
    !h._garbledName &&
    ((h.valueNumeric || 0) > 0 || (h.allocationNumeric || 0) > 0)
  );
  console.log(`[SPI] ISIN enrichment: ${needsISIN.length} holdings need ISINs`);
  if (!needsISIN.length) return data;

  const BATCH = 30;
  const enriched = {};
  for (let i = 0; i < needsISIN.length; i += BATCH) {
    if (i > 0) await new Promise(r => setTimeout(r, 1000)); // avoid rate limits between batches
    const batch = needsISIN.slice(i, i + BATCH);
    const listText = batch.map((h, bIdx) =>
      `${bIdx + 1}. ${h.name}${h.type ? " (" + h.type + ")" : ""}${h.currency ? " [" + h.currency + "]" : ""}`
    ).join("\n");
    const prompt = `You are a financial data expert with knowledge of global securities. For each security below, provide the ISIN if you know it with high confidence.
Rules:
- Equities: primary exchange listing ISIN
- Bonds/fixed income: the specific bond ISIN for that exact series (coupon + maturity identify the series)
- ETFs/funds: the fund ISIN
- If not highly confident: return null — do not guess or approximate
- Rights/warrants with zero value: return null

SECURITIES:
${listText}

Respond with ONLY a JSON array, one entry per security in the same order. Example:
[{"idx":1,"isin":"US0378331005"},{"idx":2,"isin":null}]`;

    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2048,
          system: "You are a financial data API. Output ONLY a valid JSON array. No markdown, no preamble, no explanation.",
          messages: [{ role: "user", content: prompt }]
        })
      });
      if (!resp.ok) {
        console.warn(`[SPI] ISIN enrichment API error: ${resp.status}`);
        continue;
      }
      const respJson = await resp.json();
      const rawTxt = (respJson.content || []).map(b => b.text || "").join("").trim()
        .replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/, "").trim();
      console.log(`[SPI] ISIN batch ${Math.floor(i/BATCH)+1} raw response (first 200):`, rawTxt.slice(0, 200));
      const parsed = JSON.parse(rawTxt);
      for (const r of parsed) {
        if (!r || !r.isin || r.isin === null || r.isin === "null") continue;
        const isinStr = String(r.isin).trim().toUpperCase();
        if (!/^[A-Z]{2}[A-Z0-9]{9}[0-9]$/.test(isinStr)) continue;
        const holding = batch[(r.idx || 0) - 1];
        if (holding) {
          enriched[holding.name] = isinStr;
          console.log(`[SPI] ISIN found: ${holding.name} -> ${isinStr}`);
        }
      }
    } catch (err) {
      console.warn("[SPI] ISIN enrichment batch failed:", err?.message || err);
    }
  }

  const enrichedCount = Object.keys(enriched).length;
  console.log(`[SPI] ISIN enrichment complete: ${enrichedCount} ISINs resolved`);
  if (!enrichedCount) return data;

  let filled = 0;
  const enrichedHoldings = (data.holdings || []).map(h => {
    const resolved = enriched[h.name];
    if (resolved) {
      filled++;
      return { ...h, isin: resolved, _isinEnriched: true };
    }
    return h;
  });

  return {
    ...data,
    holdings: enrichedHoldings,
    _isinEnriched: filled,
    _autoFixes: [...(data._autoFixes || []),
      { field: "holdings[*].isin", reason: `ISIN backfill: ${filled} ISINs resolved from model knowledge`, original: "-", corrected: "enriched" }
    ]
  };
}

    aiCorrectionCount: (aiVerification?.corrections || []).length
